<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>בחירת מתנות עובדים</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brand">בחירת מתנות עובדים</div>
        <div class="muted">בחרו מתנה אחת מתוך מה שנשאר במלאי</div>
      </div>
      <a class="btn btn-secondary" href="admin.html">ממשק ניהול</a>
    </div>
  </header>

  <main class="container">
    <section class="card">
      <h2>פרטי עובד</h2>
      <form id="worker-form" class="grid">
        <div class="col-4">
          <label for="employeeName">שם עובד</label>
          <input id="employeeName" required />
        </div>
        <div class="col-4">
          <label for="workSite">אתר עבודה</label>
          <input id="workSite" required />
        </div>
        <div class="col-4">
          <label for="department">מוקד / מחלקה</label>
          <input id="department" required />
        </div>
        <div class="col-4">
          <label for="employeeId">תעודת זהות</label>
          <input id="employeeId" inputmode="numeric" placeholder="9 ספרות" required />
        </div>
        <div class="col-4">
          <label for="phone">טלפון</label>
          <input id="phone" inputmode="tel" placeholder="0501234567" required />
        </div>

        <div class="col-12">
          <h3>מתנות זמינות</h3>
          <div id="giftsGrid" class="gifts-grid"></div>
        </div>

        <div class="col-12 actions">
          <button type="submit">שמור בחירה</button>
        </div>
        <div class="col-12 message" id="workerMsg"></div>
      </form>
    </section>
  </main>

  <script src="app.js"></script>
  <script src="worker.js"></script>
</body>
</html>
