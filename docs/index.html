<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>בחירת מתנה לעובדים</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <h1>בחירת מתנה לעובדים</h1>
    <a class="btn btn-secondary" href="admin.html">ניהול</a>
  </header>

  <main class="container">
    <section class="card">
      <h2>פרטי עובד</h2>
      <form id="selection-form" class="form-grid">
        <label>
          שם עובד
          <input type="text" id="employeeName" required />
        </label>

        <label>
          אתר עבודה
          <input type="text" id="workSite" required />
        </label>

        <label>
          מוקד
          <input type="text" id="centerName" required />
        </label>

        <div>
          <p class="muted">בחר מתנה אחת מהגלריה ולחץ על "אישור בחירה".</p>
        </div>

        <div class="full-width">
          <button class="btn" type="submit">אישור בחירה</button>
        </div>
      </form>
      <p id="message" class="message"></p>
    </section>

    <section class="card">
      <h2>גלריית מתנות</h2>
      <div id="gifts-grid" class="gift-grid"></div>
    </section>
  </main>

  <script src="worker.js"></script>
</body>
</html>
