<!doctype html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ממשק ניהול מתנות</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <header class="topbar">
    <div class="topbar-inner">
      <div>
        <div class="brand">ממשק ניהול</div>
        <div class="muted">סיסמה: E123123</div>
      </div>
      <a class="btn btn-secondary" href="index.html">חזרה למסך העובדים</a>
    </div>
  </header>

  <main class="container">
    <section class="login-shell" id="loginShell">
      <div class="card login-card">
        <h2>כניסת מנהל</h2>
        <form id="loginForm" class="grid">
          <div class="col-12">
            <label for="adminPassword">סיסמת ניהול</label>
            <input id="adminPassword" type="password" placeholder="הזן סיסמה" required />
          </div>
          <div class="col-12 actions">
            <button type="submit">כניסה</button>
          </div>
          <div class="col-12 message" id="loginMsg"></div>
        </form>
      </div>
    </section>

    <section id="adminPanel" style="display:none;">
      <div class="tabs">
        <button class="tab-btn active" data-tab="gifts">ניהול מתנות</button>
        <button class="tab-btn" data-tab="selections">בחירות עובדים</button>
        <button id="logoutBtn" class="btn btn-danger">יציאה</button>
      </div>

      <section class="tab-panel active" data-panel="gifts">
        <div class="card">
          <h3>הוספת מתנה</h3>
          <form id="giftForm" class="grid">
            <div class="col-4">
              <label for="giftName">שם מתנה</label>
              <input id="giftName" required />
            </div>
            <div class="col-4">
              <label for="giftDescription">תיאור</label>
              <input id="giftDescription" />
            </div>
            <div class="col-4">
              <label for="giftQty">כמות</label>
              <input id="giftQty" type="number" min="0" value="0" required />
            </div>
            <div class="col-6">
              <label for="giftImage">תמונה (אופציונלי)</label>
              <input id="giftImage" type="file" accept="image/*" />
            </div>
            <div class="col-12 actions">
              <button type="submit">הוסף מתנה</button>
            </div>
            <div class="col-12 message" id="giftMsg"></div>
          </form>
        </div>

        <div class="card">
          <h3>רשימת מתנות</h3>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>תמונה</th>
                  <th>שם</th>
                  <th>תיאור</th>
                  <th>כמות</th>
                  <th>נבחרו</th>
                  <th>נותר</th>
                  <th>פעולה</th>
                </tr>
              </thead>
              <tbody id="giftsTable"></tbody>
            </table>
          </div>
        </div>
      </section>

      <section class="tab-panel" data-panel="selections">
        <div class="card">
          <div class="actions" style="margin-bottom:10px;">
            <button id="exportBtn" class="btn btn-ok" type="button">ייצוא CSV</button>
            <button id="clearSelectionsBtn" class="btn btn-danger" type="button">נקה בחירות</button>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>שם עובד</th>
                  <th>אתר עבודה</th>
                  <th>מוקד</th>
                  <th>מתנה</th>
                  <th>תאריך</th>
                </tr>
              </thead>
              <tbody id="selectionsTable"></tbody>
            </table>
          </div>
        </div>
      </section>
    </section>
  </main>

  <script src="app.js"></script>
  <script>
    const ADMIN_PASSWORD = "E123123";
    const AUTH_KEY = "gpp_admin_auth";

    const loginShell = document.getElementById("loginShell");
    const adminPanel = document.getElementById("adminPanel");
    const loginForm = document.getElementById("loginForm");
    const loginMsg = document.getElementById("loginMsg");
    const giftForm = document.getElementById("giftForm");
    const giftsTable = document.getElementById("giftsTable");
    const selectionsTable = document.getElementById("selectionsTable");

    function setMsg(el, text, isError) {
      el.textContent = text;
      el.className = "message " + (text ? (isError ? "error" : "success") : "");
    }

    function setAuth(v) {
      localStorage.setItem(AUTH_KEY, v ? "1" : "0");
    }

    function isAuth() {
      return localStorage.getItem(AUTH_KEY) === "1";
    }

    function applyAuthView() {
      const ok = isAuth();
      loginShell.style.display = ok ? "none" : "grid";
      adminPanel.style.display = ok ? "block" : "none";
      if (ok) {
        renderGifts();
        renderSelections();
      }
    }

    loginForm.addEventListener("submit", (e) => {
      e.preventDefault();
      const val = document.getElementById("adminPassword").value;
      if (val === ADMIN_PASSWORD) {
        setAuth(true);
        setMsg(loginMsg, "כניסה הצליחה.", false);
        applyAuthView();
      } else {
        setMsg(loginMsg, "סיסמה שגויה.", true);
      }
    });

    document.getElementById("logoutBtn").addEventListener("click", () => {
      setAuth(false);
      applyAuthView();
    });

    document.querySelectorAll(".tab-btn[data-tab]").forEach((btn) => {
      btn.addEventListener("click", () => {
        document.querySelectorAll(".tab-btn[data-tab]").forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        const tab = btn.getAttribute("data-tab");
        document.querySelectorAll(".tab-panel").forEach((p) => {
          p.classList.toggle("active", p.getAttribute("data-panel") === tab);
        });
      });
    });

    function fileToDataUrl(file) {
      return new Promise((resolve, reject) => {
        if (!file) return resolve("");
        const r = new FileReader();
        r.onload = () => resolve(String(r.result || ""));
        r.onerror = reject;
        r.readAsDataURL(file);
      });
    }

    async function addGift(e) {
      e.preventDefault();
      const name = document.getElementById("giftName").value.trim();
      const description = document.getElementById("giftDescription").value.trim();
      const quantity = Number(document.getElementById("giftQty").value || 0);
      const file = document.getElementById("giftImage").files[0];

      if (!name) {
        setMsg(document.getElementById("giftMsg"), "שם מתנה הוא שדה חובה.", true);
        return;
      }

      const imageDataUrl = await fileToDataUrl(file);
      const list = GPP.gifts();
      list.push({
        id: GPP.uid(),
        name,
        description,
        quantity: Math.max(0, quantity),
        imageDataUrl,
        createdAt: new Date().toISOString(),
      });
      GPP.saveGifts(list);
      giftForm.reset();
      document.getElementById("giftQty").value = "0";
      setMsg(document.getElementById("giftMsg"), "המתנה נוספה.", false);
      renderGifts();
    }

    function deleteGift(id) {
      if (!confirm("למחוק מתנה זו?")) return;
      const gifts = GPP.gifts().filter((g) => g.id !== id);
      const selections = GPP.selections().filter((s) => s.giftId !== id);
      GPP.saveGifts(gifts);
      GPP.saveSelections(selections);
      renderGifts();
      renderSelections();
    }

    function renderGifts() {
      const list = GPP.giftWithAvailability();
      giftsTable.innerHTML = list.map((g) => `
        <tr>
          <td><img class="thumb" src="${g.imageDataUrl || "https://placehold.co/120x120/e9eef5/5f6d7a?text=Gift"}" alt="${g.name}" /></td>
          <td>${g.name}</td>
          <td>${g.description || ""}</td>
          <td>${g.quantity}</td>
          <td>${g.selected}</td>
          <td>${g.remaining}</td>
          <td><button class="btn btn-danger" data-del="${g.id}">מחיקה</button></td>
        </tr>
      `).join("") || '<tr><td colspan="7">אין מתנות.</td></tr>';

      giftsTable.querySelectorAll("[data-del]").forEach((btn) => {
        btn.addEventListener("click", () => deleteGift(btn.getAttribute("data-del")));
      });
    }

    function renderSelections() {
      const list = GPP.selections().slice().sort((a, b) => b.createdAt.localeCompare(a.createdAt));
      selectionsTable.innerHTML = list.map((s) => `
        <tr>
          <td>${s.employeeName}</td>
          <td>${s.workSite}</td>
          <td>${s.department}</td>
          <td>${s.giftName}</td>
          <td>${new Date(s.createdAt).toLocaleString("he-IL")}</td>
        </tr>
      `).join("") || '<tr><td colspan="5">אין בחירות.</td></tr>';
    }

    document.getElementById("exportBtn").addEventListener("click", () => {
      const rows = [["שם עובד", "אתר עבודה", "מוקד", "מתנה", "תאריך"]];
      GPP.selections().forEach((s) => {
        rows.push([
          s.employeeName,
          s.workSite,
          s.department,
          s.giftName,
          new Date(s.createdAt).toLocaleString("he-IL"),
        ]);
      });
      GPP.downloadCsv("gift-selections.csv", rows);
    });

    document.getElementById("clearSelectionsBtn").addEventListener("click", () => {
      if (!confirm("למחוק את כל הבחירות?")) return;
      GPP.saveSelections([]);
      renderSelections();
      renderGifts();
    });

    giftForm.addEventListener("submit", addGift);
    applyAuthView();
  </script>
</body>
</html>
